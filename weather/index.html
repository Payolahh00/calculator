<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    
    <main>
        <form action="">
            <input type="text" autocomplete="off">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
        <section class="result">
            <figure class="name" id="city">
             <figcaption>Ghana</figcaption>
             <img src="https://flagsapi.com/GH/shiny/32.png" alt="flag">  
            </figure>
            <figure class="temperature" id="temperature">
                <img src="http://openweathermap.org/img/wn/10d@4x.png" alt="weather icon">  
                <figcaption>
                    <span>31</span>
                    <sup>0</sup>
                </figcaption>
            </figure>
            <p class="description">
                Overcast Clouds
            </p>

            <ul>
                <li>
                  <span>Clouds</span>
                  <i class="fa-solid fa-cloud"></i>
                  <span>98</span>%  
                </li>
                <li>
                    <span>Humidity</span>
                    <i class="fa-solid fa-droplet"></i>
                    <span>55</span>%
                </li>
                <li>
                    <span>Pressure</span>
                    <i class="fa-solid fa-gauge"></i>
                    <span>1001</span>hPa
                </li>
            </ul>
        </section>
    </main>
    
<script src="app.js"></script>
</body>
</html>
